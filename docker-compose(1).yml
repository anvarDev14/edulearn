version: '3.9'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/edulearn.db
      - SECRET_KEY=${SECRET_KEY}
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBAPP_URL=${WEBAPP_URL}
      - ADMIN_IDS=${ADMIN_IDS}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MONTHLY_PRICE=${MONTHLY_PRICE:-50000}
      - YEARLY_PRICE=${YEARLY_PRICE:-500000}
      - PAYMENT_CARD=${PAYMENT_CARD}
      - PAYMENT_HOLDER=${PAYMENT_HOLDER}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    networks:
      - edulearn

  bot:
    build: ./bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBAPP_URL=${WEBAPP_URL}
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - edulearn

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - edulearn

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - edulearn

networks:
  edulearn:
    driver: bridge
